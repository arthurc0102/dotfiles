## List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'laktak/extrakto'


## Title config
set -g set-titles on
set -g set-titles-string '#S | #{?#{==:#{pane_current_command},#{b:SHELL}},#(echo "#{pane_current_path}" | sed "s|^$HOME|~|;s|^/private||"),#{pane_current_command}}'


## Window config
set -g renumber-windows on


## Key binding config

# Prefix
set -g prefix 'C-]'

# Window navigation
bind -r p previous-window
bind -r n next-window

# Window split
unbind %
bind / split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -r . select-pane -t :.+
bind -r , select-pane -t :.-

# Break and join panes
bind b 'break-pane -d; new-window -a -d -n tmp; move-window -s -1 -t :+ -d -k'
bind j join-pane -s :+
bind J command-prompt -p "join pane from:"  "join-pane -s '%%'"

# Edit pane scrollback in editor
bind B send-keys 'tmux capture-pane -p -S - | vipe > /dev/null' Enter

# Synchronize panes
bind S 'set-window-option synchronize-panes'


## Mouse mode config
set -g mouse on
bind m 'set -g mouse; display-message "Mouse mode is #{?mouse,on,off}"'


## Copy mode config

# Disable "release mouse drag to copy and exit copy-mode", ref: https://github.com/tmux/tmux/issues/140
unbind -T copy-mode MouseDragEnd1Pane

# Since MouseDragEnd1Pane neither exit copy-mode nor clear selection now,
# let single click do selection clearing for us.
bind -T copy-mode MouseDown1Pane 'select-pane; send-keys -X clear-selection'

# This line changes the default binding of MouseDrag1Pane, the only difference
# is that we use `copy-mode -eM` instead of `copy-mode -M`, so that WheelDownPane
# can trigger copy-mode to exit when copy-mode is entered by MouseDrag1Pane
bind -n MouseDrag1Pane if -Ft= '#{mouse_any_flag}' 'if -Ft= \"#{pane_in_mode}\" \"copy-mode -eM\" \"send-keys -M\"' 'copy-mode -eM'


## Theme config

# Catppuccin options (must be set BEFORE loading the plugin)
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_status_right_separator ' '
set -g @catppuccin_status_connect_separator 'no'

# Load catppuccin plugin
run "${XDG_CONFIG_HOME}/tmux/plugins/tmux/catppuccin.tmux"

# Status line
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"


## Load local config
source-file "${XDG_CONFIG_HOME}/tmux/tmux.conf.local"


## Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "${XDG_CONFIG_HOME}/tmux/plugins/tpm/tpm"

# Copy mode highlight (use run-shell to defer execution after TPM,
# since catppuccin hardcodes mode-style without an override option.
# plain `set` won't work here because `run` is async — a `set` after
# TPM's `run` may execute before TPM finishes loading plugins)
run-shell 'tmux set -g mode-style "fg=#1e1e2e,bg=#f9e2af"'
